*{margin:0;padding:0;box-sizing:border-box;}

/* LOCK */
#lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}




.dots{display:flex;gap:14px;margin-bottom:32px;}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #333;background:transparent;transition:all .15s;}

.dot.err{background:#EF4444;border-color:#EF4444;}
.errmsg{font-size:10px;color:#EF4444;font-weight:600;height:16px;letter-spacing:.06em;text-transform:uppercase;opacity:0;transition:opacity .2s;margin-bottom:24px;}
.errmsg.show{opacity:1;}

.k{width:72px;height:72px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .1s,transform .1s;}
.k:active{background:var(--g);transform:scale(.93);}
.kn{font-size:22px;font-weight:800;color:#fff;line-height:1;}
.ks{font-size:7px;font-weight:600;color:#444;letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.kdel{background:transparent;border:1px solid #2a2a2a;}
.kdel:active{background:#333;}
.kempty{background:transparent;border:none;cursor:default;}
.kempty:active{background:transparent;transform:none;}

/* APP */
#app{display:none;}
#app.on{display:block;background:#F4F4F1;min-height:100vh;}
.page{display:none;padding-bottom:80px;}
.page.on{display:block;}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:999;background:#0E0E0E;display:flex;border-top:3px solid var(--g);}
.btab{flex:1;padding:10px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;border-top:3px solid transparent;margin-top:-3px;-webkit-tap-highlight-color:transparent;}
.btab.on{background:#111;border-top-color:var(--g);}
.bico{font-size:18px;}
.blbl{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#666;}
.btab.on .blbl{color:var(--g);}

@keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

}

<script>
const HASH="b3282a2f2a28757b3a18ab833de16a9c54518c0b0cf493e3f0a7cf09386f326a";
let buf=[];

async function h256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function ud(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.className='dot'+(i<buf.length?' on':'');
  }
}
function pk(k){
  if(buf.length>=4)return;
  buf.push(k);ud();
  if(buf.length===4)chk();
}
function del(){
  if(buf.length){buf.pop();ud();document.getElementById('errmsg').className='errmsg';}
}
async function chk(){
  const h=await h256(buf.join(''));
  if(h===HASH){unlock();}
  else{
    document.querySelectorAll('.dot').forEach(d=>d.className='dot err');
    document.getElementById('errmsg').className='errmsg show';
    setTimeout(()=>{buf=[];ud();document.getElementById('errmsg').className='errmsg';},1200);
  }
}
function unlock(){
  // Inject template content into pages
  ['0','1','2'].forEach(i=>{
    const tpl=document.getElementById('t'+i);
    const pg=document.getElementById('p'+i);
    pg.innerHTML=tpl.innerHTML;
    // Re-execute any scripts
    pg.querySelectorAll('script').forEach(s=>{
      const ns=document.createElement('script');
      ns.textContent=s.textContent;
      document.body.appendChild(ns);
    });
  });
  document.getElementById('lock').style.display='none';
  document.body.style.background='#F4F4F1';
  document.getElementById('app').className='on';
}
function sp(i){
  document.querySelectorAll('.page').forEach((p,j)=>p.className='page'+(j===i?' on':''));
  document.querySelectorAll('.btab').forEach((t,j)=>t.className='btab'+(j===i?' on':''));
  window.scrollTo(0,0);
}
function showPage(i){sp(i);}
function toggleCard(e,hdr){
  e.stopPropagation();
  const wrap=hdr.closest('div[style*="border-radius:10px"]');
  if(!wrap)return;
  const body=wrap.querySelector('.cbody');
  const chev=wrap.querySelector('.chev');
  if(!body)return;
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  if(chev)chev.style.transform=open?'':'rotate(180deg)';
}
</script>
